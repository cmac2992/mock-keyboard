<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contenteditable</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 0;
        min-height: 160vh;
        padding: 32px;
      }

      [contenteditable] {
        border: 1px solid #ccc;
        margin-top: 70vh;
        min-height: 120px;
        padding: 12px;
      }
    </style>
  </head>
  <body>
    <div id="editor" contenteditable="true">Tap here</div>
  </body>
</html>
