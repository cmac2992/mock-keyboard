<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sticky Footer</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 0;
        min-height: 180vh;
      }

      .footer {
        background: #fff6e8;
        bottom: 0;
        padding: 16px;
        position: sticky;
      }
    </style>
  </head>
  <body>
    <div style="height: 150vh"></div>
    <div class="footer" data-mock-keyboard-anchor="bottom">
      Sticky footer
    </div>
  </body>
</html>
