<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic Form</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 0;
        min-height: 180vh;
        padding: 24px;
      }

      form {
        display: grid;
        gap: 18px;
        margin-top: 60vh;
        max-width: 320px;
      }

      input,
      textarea {
        font: inherit;
        padding: 12px;
      }
    </style>
  </head>
  <body>
    <form>
      <input id="field-a" placeholder="First field" />
      <input id="field-b" placeholder="Second field" />
      <textarea id="field-c" placeholder="Message"></textarea>
    </form>
    <script>
      window.mockKeyboardEvents = [];
      window.addEventListener('mockkeyboardchange', (event) => {
        window.mockKeyboardEvents.push(event.detail);
      });
    </script>
  </body>
</html>
